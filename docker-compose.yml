services:
  frontend:
    build:
      context: .
      target: dev
      args:
        VITE_API_URL: "http://localhost:30000"
    container_name: upload-image-cont
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src 
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    external: true
