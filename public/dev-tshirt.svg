  <!-- T恤主体 -->
  <path d="M 50 50 L 70 50 L 75 80 L 125 80 L 130 50 L 150 50 L 150 200 Q 150 250 100 260 Q 50 250 50 200 Z" 
        fill="#000000" stroke="#333" stroke-width="1"/>
  
